<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Wanabe Banking</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen">

    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <span class="font-bold text-xl tracking-tight">WANABE BANKING</span>
            <a href="dashboard.html"
                class="flex items-center gap-2 bg-blue-700 hover:bg-blue-800 px-4 py-2 rounded-xl text-sm font-medium transition-all">
                Back to Dashboard
            </a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-10">
        <h2 class="text-2xl font-bold text-slate-800 mb-6">Profile & Accounts</h2>

        <div id="userInfo" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <h3 class="text-lg font-bold text-slate-800 mb-4 border-b border-slate-100 pb-2">Personal Information</h3>
            <div class="space-y-2">
                <p class="text-slate-600">Name: <span id="userName"
                        class="font-semibold text-slate-900">Loading...</span></p>
                <p class="text-slate-600">Email: <span id="userEmail"
                        class="font-semibold text-slate-900">Loading...</span></p>
            </div>
        </div>

        <h3 class="text-lg font-bold text-slate-800 mb-4">My Bank Accounts</h3>
        <div id="cardsList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        </div>
    </main>

    <div id="passwordModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-lg font-bold text-slate-800 mb-4">Confirm Identity</h3>
            <p class="text-sm text-slate-600 mb-4">Please enter your password to change account status:</p>
            <input type="password" id="confirmPassword" class="w-full px-4 py-2 border rounded-xl mb-4"
                placeholder="Enter your password">
            <div class="flex gap-2">
                <button onclick="closePasswordModal()"
                    class="w-full bg-slate-100 py-2 rounded-xl font-bold text-slate-700">Cancel</button>
                <button onclick="executeStatusChange()"
                    class="w-full bg-blue-600 text-white py-2 rounded-xl font-bold">Confirm</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="../assets/js/profile.js"></script>
</body>

</html>
