<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account | Wanabe Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-blue-600 text-white shadow-md">
        <div class="max-w-2xl mx-auto px-4 py-3 flex justify-between items-center">
            <span class="font-bold text-xl">WANABE BANKING</span>
            <a href="dashboard.html" class="text-sm hover:underline">Back to Dashboard</a>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 py-10">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Create New Account</h2>
            <form id="createAccountForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Initial Balance (VND)</label>
                    <input type="number" id="initialBalance" required min="0" value="0" class="w-full px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Role</label>
                    <select id="isManager" class="w-full px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="false">User</option>
                        <option value="true">Manager</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Create Account</button>
            </form>
        </div>
    </main>

    <div id="successModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-8 w-full max-w-sm shadow-2xl text-center transform transition-all">
            <div class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">Account Created!</h3>
            <p class="text-sm text-slate-500 mb-4">Here is your new account number:</p>
            
            <p id="newAccountNumber" class="text-3xl font-mono font-bold text-blue-600 bg-blue-50 py-3 rounded-xl mb-6 tracking-wider border border-blue-100"></p>
            
            <button id="btnGoToProfile" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-900 transition shadow-md">
                Go to Profile
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="../assets/js/create-account.js"></script>
</body>
</html>
