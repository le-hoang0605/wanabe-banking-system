<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Wanabe Bank</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex bg-white">

    <div class="w-full lg:w-1/2 flex flex-col justify-center px-12 lg:px-24 relative">

        <div class="flex items-center gap-2.5 mb-8 absolute top-8 left-12 lg:left-24">
            <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-blue-200">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 21V10m0 0L7.5 14.5M12 10l4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <span class="font-extrabold text-xl tracking-tight text-slate-800">WANABE <span class="text-blue-600">BANK</span></span>
        </div>
        
        <div class="mt-12">
            <h1 class="text-3xl font-bold mb-2 text-slate-800">Log in</h1>
            <p class="text-gray-500 mb-6">Welcome back! Please enter your details.</p>
        </div>
        
        <form id="loginForm" class="space-y-5">
            <div id="errorBox" class="hidden bg-red-100 text-red-700 p-3 rounded-xl text-sm border border-red-200"></div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com" 
                       class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" id="password" required placeholder="••••••••" 
                       class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition text-sm">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 active:scale-[0.99] transition shadow-md shadow-blue-200 mt-2">
                Sign In
            </button>
        </form>
        
        <p class="mt-6 text-center text-sm text-slate-500">
            Don't have an account? <a href="signup.html" class="text-blue-600 font-semibold hover:underline">Sign up</a>
        </p>
    </div>

    <div class="hidden lg:flex w-1/2 bg-gradient-to-tr from-blue-700 via-indigo-800 to-slate-900 items-center justify-center p-12 relative overflow-hidden">
        <div class="absolute -top-20 -right-20 w-80 h-80 bg-blue-500 rounded-full filter blur-[80px] opacity-30"></div>
        <div class="absolute -bottom-20 -left-20 w-80 h-80 bg-purple-500 rounded-full filter blur-[80px] opacity-20"></div>
        
        <div class="bg-white/10 backdrop-blur-lg p-10 rounded-2xl shadow-2xl w-full max-w-md border border-white/10 text-white">
            <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center mb-6 shadow-inner">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold mb-4 tracking-tight">Wanabe Banking</h2>
            <p class="text-blue-100/80 leading-relaxed text-sm">Access & manage your account and transactions efficiently with high-speed processing and advanced protection.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="../assets/js/auth.js"></script>
</body>
</html>
